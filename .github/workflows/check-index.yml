name: check pack index
on:
  push:
    branches: [main]
    paths:
      - "packs.json"
      - "tests/**"
      - ".github/workflows/check-index.yml"
  pull_request:
    paths:
      - "packs.json"
      - "tests/**"
      - ".github/workflows/release-pack.yml"
      - ".github/workflows/check-index.yml"

jobs:
  no-placeholder-sha:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: regression guard — no PLACEHOLDER sha256 in packs.json
        run: bash tests/no-placeholder-sha.sh

  release-bump-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: simulate release-pack.yml's bump-on-main step
        run: bash tests/release-bump-preserves-prior-packs.sh
