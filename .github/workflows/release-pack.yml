name: Release pack

# Automates the tarball + sha256 + index update + GitHub release that
# `voiceforge pack install <name>` consumes.
#
# Triggered by tag push: <pack>-v<X.Y.Z> (e.g. peter-v0.1.0, kimmel-v0.1.0).
#
# Steps:
# 1. Validate manifest.toml schema.
# 2. Regenerate checksums.txt from wav/ + reference.wav + manifest.toml.
# 3. Build flat tarball under packs/<pack>/.
# 4. Compute sha256 + size.
# 5. Switch to main FIRST, then update packs.json on top of main's
#    current state. (Earlier versions stashed the tag's packs.json and
#    cp'd over main, which clobbered prior packs' sha bumps back to
#    PLACEHOLDER. Fixed.)
# 6. Commit the bump back to main.
# 7. Create GitHub release with the tarball attached.

on:
  push:
    tags:
      - "*-v[0-9]+.[0-9]+.[0-9]+"
      - "*-v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write  # tarball release + commit packs.json bump

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to switch to main + push

      - name: Parse pack + version from tag
        id: tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Tag shape: <pack>-v<X.Y.Z>[-pre]. Extract pack and version.
          if [[ ! "$TAG" =~ ^([a-z0-9_]+)-v([0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?)$ ]]; then
            echo "::error::tag $TAG does not match <pack>-v<semver>" >&2
            exit 1
          fi
          pack="${BASH_REMATCH[1]}"
          version="${BASH_REMATCH[2]}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "pack=$pack" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "parsed: pack=$pack version=$version"

      - name: Validate manifest.toml schema
        env:
          PACK: ${{ steps.tag.outputs.pack }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import os, sys, tomllib
          pack = os.environ["PACK"]
          expected_version = os.environ["VERSION"]
          path = f"packs/{pack}/manifest.toml"
          if not os.path.exists(path):
              print(f"::error::missing {path}", file=sys.stderr); sys.exit(1)
          with open(path, "rb") as f:
              m = tomllib.load(f)
          required = ["schema_version", "name", "version", "voice_source",
                      "tier", "reference_prompt_text"]
          missing = [k for k in required if k not in m]
          if missing:
              print(f"::error::manifest.toml missing keys: {missing}", file=sys.stderr); sys.exit(1)
          if m["name"] != pack:
              print(f"::error::manifest name {m['name']!r} != tag pack {pack!r}", file=sys.stderr); sys.exit(1)
          if m["version"] != expected_version:
              print(f"::error::manifest version {m['version']!r} != tag version {expected_version!r}", file=sys.stderr); sys.exit(1)
          if "phrase_text" not in m or not isinstance(m["phrase_text"], dict) or not m["phrase_text"]:
              print(f"::error::manifest [phrase_text] table is missing or empty", file=sys.stderr); sys.exit(1)
          print(f"manifest ok: pack={m['name']} version={m['version']} phrases={len(m['phrase_text'])}")
          PYEOF

      - name: Regenerate checksums.txt
        env:
          PACK: ${{ steps.tag.outputs.pack }}
        run: |
          set -euo pipefail
          cd "packs/${PACK}"
          # Skip macOS resource-fork files (._*) and the checksums file
          # itself. Sort for reproducibility.
          {
            for f in $(find . -type f ! -name 'checksums.txt' ! -name '._*' | sort); do
              sha=$(sha256sum "$f" | awk '{print $1}')
              # Strip the leading ./
              name="${f#./}"
              printf '%s  %s\n' "$sha" "$name"
            done
          } > checksums.txt
          echo "regenerated checksums.txt:"
          cat checksums.txt

      - name: Build flat tarball
        env:
          PACK: ${{ steps.tag.outputs.pack }}
        run: |
          set -euo pipefail
          # Flat layout: tar contents are manifest.toml, reference.wav,
          # wav/, checksums.txt — no <pack>/ prefix. voiceforge pack install
          # extracts into ~/.voiceforge/packs/<pack>/ and expects this layout.
          export COPYFILE_DISABLE=1
          tar -czf "/tmp/${PACK}.tar.gz" -C "packs/${PACK}" manifest.toml reference.wav wav checksums.txt
          ls -lh "/tmp/${PACK}.tar.gz"

      - name: Compute sha256 + size
        id: tarball
        env:
          PACK: ${{ steps.tag.outputs.pack }}
        run: |
          set -euo pipefail
          sha=$(sha256sum "/tmp/${PACK}.tar.gz" | awk '{print $1}')
          size=$(stat -c%s "/tmp/${PACK}.tar.gz")
          echo "sha=$sha"   >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"

      - name: Bump packs.json on main (apply to main's CURRENT state, not the tag's)
        # CRITICAL: the bump MUST be applied to main's CURRENT packs.json,
        # not to the tag's snapshot. An earlier version of this workflow
        # bumped packs.json IN THE TAG CHECKOUT and then cp'd it over
        # main, which clobbered any sha bumps that landed between the tag
        # and now. That regressed `trump` and `musk` to PLACEHOLDER and
        # broke `voiceforge pack install` for both. The CI guard
        # `tests/no-placeholder-sha.sh` (added in the same fix PR) will
        # catch a recurrence, but the right structural fix is to
        # `git checkout main` FIRST and only THEN apply the per-pack
        # update on top of main's authoritative state.
        env:
          PACK: ${{ steps.tag.outputs.pack }}
          VERSION: ${{ steps.tag.outputs.version }}
          TAG: ${{ steps.tag.outputs.tag }}
          SHA: ${{ steps.tarball.outputs.sha }}
          SIZE: ${{ steps.tarball.outputs.size }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Stash ONLY checksums.txt — per-pack, no cross-pack pollution.
          # Do NOT stash packs.json (that was the bug we are fixing).
          cp "packs/${PACK}/checksums.txt" "/tmp/_${PACK}.checksums.txt.bumped"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Restore tracked working-tree files so `git checkout main`
          # doesn't bail. `git ls-files --error-unmatch` filters to files
          # that exist in the tag's index (first-release checksums.txt
          # may not be tracked yet — leave it as untracked, it survives
          # the checkout untouched).
          for f in packs.json "packs/${PACK}/checksums.txt"; do
            if git ls-files --error-unmatch -- "$f" > /dev/null 2>&1; then
              git checkout -- "$f"
            fi
          done
          git checkout main
          git pull --ff-only origin main

          # Apply the per-pack update to MAIN's packs.json (which has all
          # prior packs' real shas — preserve those). Python reads the
          # env, so attacker-controlled tag content can't break out of
          # the script. The Python program itself is a fixed literal.
          python3 - <<'PYEOF'
          import json, os, sys
          pack = os.environ["PACK"]
          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          sha = os.environ["SHA"]
          size = int(os.environ["SIZE"])
          repo = os.environ["REPO"]

          with open("packs.json") as f:
              idx = json.load(f)
          if pack not in idx["packs"]:
              print(f"pack {pack!r} not in packs.json (add manifest first, then tag)", file=sys.stderr)
              sys.exit(1)
          entry = idx["packs"][pack]
          entry["tarball_url"] = f"https://github.com/{repo}/releases/download/{tag}/{pack}.tar.gz"
          entry["tarball_sha256"] = sha
          entry["tarball_size_bytes"] = size
          entry["version"] = version
          with open("packs.json", "w") as f:
              json.dump(idx, f, indent=2)
              f.write("\n")
          PYEOF

          # Restore the per-pack checksums.txt (action is authoritative
          # for it on release).
          cp "/tmp/_${PACK}.checksums.txt.bumped" "packs/${PACK}/checksums.txt"

          # Belt and braces: refuse to push if any pack would ship with
          # PLACEHOLDER. Duplicates tests/no-placeholder-sha.sh's check
          # so the workflow itself can't accidentally introduce one.
          if grep -q '"tarball_sha256": "PLACEHOLDER"' packs.json; then
            echo "::error::packs.json still contains PLACEHOLDER tarball_sha256 after bump; refusing to commit" >&2
            grep -nE '"(tarball_sha256|display_name)"' packs.json
            exit 1
          fi

          if git diff --quiet packs.json "packs/${PACK}/checksums.txt"; then
            echo "no index changes to commit (already in sync)"
            exit 0
          fi
          git add packs.json "packs/${PACK}/checksums.txt"
          git commit -m "release: ${PACK} ${TAG} (sha256=${SHA})"

          # If push races and gets rejected, pull --rebase + push once.
          if ! git push origin main; then
            echo "push race detected; rebasing + retrying"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Create GitHub release
        env:
          PACK: ${{ steps.tag.outputs.pack }}
          TAG: ${{ steps.tag.outputs.tag }}
          SHA: ${{ steps.tarball.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes=$(cat <<NOTES
          Auto-built tarball; sha256 verified by \`voiceforge pack install\`.

          - sha256: \`${SHA}\`
          - install: \`voiceforge pack install ${PACK}\`
          - manifest: https://raw.githubusercontent.com/${{ github.repository }}/main/packs/${PACK}/manifest.toml
          NOTES
          )
          gh release create "$TAG" \
            "/tmp/${PACK}.tar.gz" \
            --title "${PACK} ${TAG}" \
            --notes "$notes"
