# voice-forge-packs schema_version = 1
# This pack is consumed by `voiceforge pack install peter` (ROADMAP 6.2)
# and played at runtime by `voiceforge play --pack peter --event <id>`
# (ROADMAP 6.5).

schema_version = 1
name           = "peter"
display_name   = "Peter Griffin"
description    = "Peter Griffin from Family Guy, rendered with fish-speech S2 Pro from a 64-second clip of the S5 Nike-commercial parody."

# What was used to generate the WAVs
rendered_with        = "fishaudio/fish-speech S2 Pro"
rendered_at          = "2026-05-04"
sample_rate          = 44100
channels             = 1
phrases              = 13

# Provenance (required by the contribution policy)
voice_source         = "Peter Griffin (Family Guy, Fox)"
source_clip_url      = "https://www.youtube.com/watch?v=T2w5SQ0L65I"
source_clip_episode  = "S5 Nike-commercial parody"
source_clip_duration = 64.0
reference_prompt_text = "How do you know what's inside you unless you test yourself? Don't do one push-up, do 100. Don't run one mile, run a marathon. Don't have one family, have a second family all the way across the country. Don't just have a second family. Have a third family and Santa Fe with an alternative lifestyle. Don't spend any time with the first two families. Take a commitment to family number three and double down by announcing it at his war hero father's retirement party. Don't go to the funeral because remember you've got two other families to deal with and a marathon to train for. Don't just let Kenneth walk out of your life. Take his life from him. Don't just go to jail. Go to death row by killing the two other families. Don't just let anyone have their closure by apologizing. Send a message that you're not afraid of hell."

# Licensing
license       = "Educational / research / local-testing use only — see LICENSE-AUDIO.md at repo root"
takedown_url  = "https://github.com/humancto/voice-forge-packs/issues/new"

# Per-event phrase text. Map keys must match wav/<event>.wav filenames.
[phrase_text]
build_success   = "Holy crap Lois, the build passed. Sweet."
build_failed    = "Holy crap Lois, the build is on fire. Somebody call the fire department."
tests_passed    = "Hey Lois, the tests just passed. Get me a sandwich to celebrate."
tests_failed    = "Oh my god, the tests are failing. This is worse than the time I fought that giant chicken."
lint_error      = "What the hell is this code. Freakin sweet."
type_error      = "Lois, the types don't match. Why does this always happen to me."
deploy_success  = "Heh heh heh. I just shipped to production. What could possibly go wrong."
deploy_failed   = "Oh my god, the deploy is broken. Quick, blame Brian."
commit_success  = "Sweet. Just committed my changes. Time for a beer."
push_rejected   = "What the hell, my push got rejected. Stupid git."
secret_detected = "Oh my god, you committed your API key. What the hell is wrong with you."
agent_done      = "Holy crap, the AI agent finished. Let's see what disaster it made."
agent_stuck     = "Hey Lois, the AI is stuck. It's just like Stewie when he gets confused."
